<div class="relative z-10 mx-auto flex max-w-2xl flex-col items-center gap-6 text-center">
  <!-- Now playing -->
  <app-spotify-widget />

  <!-- Name -->
  <div class="flex flex-col gap-3">
    <p class="text-muted-foreground font-mono text-sm tracking-widest uppercase">Hi, I'm</p>
    <h1 class="text-foreground text-5xl font-bold tracking-tight sm:text-6xl lg:text-7xl">Oussema Sahbeni</h1>
    <h2 class="text-foreground h-8 overflow-hidden text-xl font-semibold sm:text-2xl" aria-label="Software Engineer">
      <span class="role-rotator flex flex-col">
        @for (role of roles; track role) {
          <span class="flex h-8 items-center justify-center">{{ role }}</span>
        }
        <!-- Duplicate of the first role so the loop wraps seamlessly -->
        <span class="flex h-8 items-center justify-center" aria-hidden="true">{{ roles[0] }}</span>
      </span>
    </h2>
  </div>

  <!-- Intro -->
  <p class="text-muted-foreground max-w-xl text-base leading-relaxed sm:text-lg">
    I build scalable web applications end to end — from clean, well-architected frontends to reliable backends.
  </p>

  <!-- Socials -->
  <div class="flex items-center gap-1">
    @for (social of socials; track social.label) {
      <a
        hlmBtn
        size="icon"
        variant="ghost"
        class="text-muted-foreground hover:text-foreground"
        target="_blank"
        rel="noopener noreferrer"
        [href]="social.link"
        [attr.aria-label]="social.label"
      >
        <ng-icon [name]="social.icon" />
      </a>
    }
  </div>
</div>
