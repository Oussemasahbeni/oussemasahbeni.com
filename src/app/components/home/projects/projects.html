<section id="projects" class="scroll-mt-24">
  <!-- Section Header -->
  <div class="text-muted-foreground mb-10 flex items-center gap-3 font-mono text-xs tracking-widest uppercase">
    <span>Projects</span>
    <span class="bg-border h-px flex-1"></span>
  </div>

  <!-- Projects Grid -->
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (item of projects(); track item.name) {
      <article
        class="group border-border bg-card hover:border-foreground/20 flex flex-col overflow-hidden rounded-2xl border transition-colors duration-300"
      >
        <!-- Media -->
        <div class="border-border bg-muted relative aspect-video overflow-hidden border-b">
          @if (item.video) {
            <video
              class="size-full object-cover transition-transform duration-500 group-hover:scale-105"
              autoplay
              muted
              loop
              playsinline
              [src]="item.video"
            ></video>
          } @else if (item.image) {
            <img
              class="size-full object-cover transition-transform duration-500 group-hover:scale-105"
              width="640"
              height="360"
              [alt]="item.name"
              [ngSrc]="item.image"
            />
          }

          <!-- Type chip over media -->
          <span hlmBadge variant="secondary" class="bg-background/70 absolute top-3 left-3 backdrop-blur-sm">
            {{ item.type }}
          </span>
        </div>

        <!-- Body -->
        <div class="flex flex-1 flex-col p-5">
          <h3 class="text-foreground text-base font-bold">{{ item.name }}</h3>
          <p class="text-muted-foreground mt-2 line-clamp-3 grow text-sm leading-relaxed">{{ item.description }}</p>

          <!-- Technologies -->
          <div class="mt-4 flex flex-wrap gap-1.5">
            @for (technology of item.techs; track technology) {
              <span hlmBadge variant="outline" class="font-mono text-xs font-normal">{{ technology }}</span>
            }
          </div>

          <!-- Action -->
          <div class="mt-5">
            @if (item.website) {
              <a
                hlmBtn
                size="sm"
                variant="outline"
                class="w-full"
                target="_blank"
                rel="noopener noreferrer"
                [href]="item.website"
              >
                Explore
                <ng-icon name="lucideArrowUpRight" />
              </a>
            } @else {
              <button hlmBtn size="sm" variant="outline" class="w-full" type="button" [disabled]="true">
                <ng-icon name="lucideLock" />
                Private Project
              </button>
            }
          </div>
        </div>
      </article>
    }
  </div>
</section>
